<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../_shared/base.css">
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <div class="slide-container">
    <div class="header">
      <div class="eyebrow" data-koda-description="koda:subtitle">Appendix</div>
      <h1 data-koda-description="koda:title">Dense Appendix</h1>
    </div>
    <div class="content">
      <div class="split" style="gap: 24px;">
        <div class="left" style="flex: 1;">
          <div class="card compact" style="grid-template-columns: 1fr; height: 100%;">
            <div class="card-body dense" data-koda-description="koda:body:left">Left column content.</div>
          </div>
        </div>
        <div class="right" style="flex: 1;">
          <div class="card compact" style="grid-template-columns: 1fr; height: 100%;">
            <div class="card-body dense" data-koda-description="koda:body:right">Right column content.</div>
          </div>
        </div>
      </div>
      <div class="citation" data-koda-description="koda:citation">Sources: (optional)</div>
    </div>
    <div class="koda-marker" data-koda-description="koda:layout:book:TITLE_AND_TWO_COLUMNS"></div>
  </div>
</body>
</html>
