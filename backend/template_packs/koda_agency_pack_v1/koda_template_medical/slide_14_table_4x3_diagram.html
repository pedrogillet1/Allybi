<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../_shared/base.css">
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <div class="slide-container">
    <div class="header">
      <div class="eyebrow" data-koda-description="koda:subtitle">Table</div>
      <h1 data-koda-description="koda:title">Table With Diagram</h1>
    </div>
    <div class="content">
      <div class="split">
        <div class="left">
          <div class="table-card">
            <div class="table" role="table" aria-label="Koda Table 4x3">
              <div class="cell head" data-koda-description="koda:table:1:1">Header 1</div>
              <div class="cell head" data-koda-description="koda:table:1:2">Header 2</div>
              <div class="cell head" data-koda-description="koda:table:1:3">Header 3</div>

              <div class="cell" data-koda-description="koda:table:2:1">Row 1</div>
              <div class="cell" data-koda-description="koda:table:2:2">Value</div>
              <div class="cell" data-koda-description="koda:table:2:3">Note</div>

              <div class="cell" data-koda-description="koda:table:3:1">Row 2</div>
              <div class="cell" data-koda-description="koda:table:3:2">Value</div>
              <div class="cell" data-koda-description="koda:table:3:3">Note</div>

              <div class="cell" data-koda-description="koda:table:4:1">Row 3</div>
              <div class="cell" data-koda-description="koda:table:4:2">Value</div>
              <div class="cell" data-koda-description="koda:table:4:3">Note</div>
            </div>
            <div class="citation" data-koda-description="koda:citation">Sources: (optional)</div>
          </div>
        </div>
        <div class="right">
          <div class="panel">
            <div class="frame" data-koda-description="koda:visual_frame:diagram:main"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="koda-marker" data-koda-description="koda:layout:medical:TITLE_AND_BODY"></div>
  </div>
</body>
</html>
