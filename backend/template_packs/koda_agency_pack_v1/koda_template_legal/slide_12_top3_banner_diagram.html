<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../_shared/base.css">
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <div class="slide-container">
    <div class="header">
      <div class="eyebrow" data-koda-description="koda:subtitle">Process</div>
      <h1 data-koda-description="koda:title">Top 3 + Banner</h1>
    </div>
    <div class="content">
      <div class="top3">
        <div class="tile">
          <div class="icon-chip" data-koda-description="koda:visual_frame:icon:concept:1"></div>
          <div>
            <div class="card-title" data-koda-description="koda:concept:1:title">Concept 1</div>
            <div class="card-body" data-koda-description="koda:concept:1:body">Body.</div>
          </div>
        </div>
        <div class="tile">
          <div class="icon-chip accent" data-koda-description="koda:visual_frame:icon:concept:2"></div>
          <div>
            <div class="card-title" data-koda-description="koda:concept:2:title">Concept 2</div>
            <div class="card-body" data-koda-description="koda:concept:2:body">Body.</div>
          </div>
        </div>
        <div class="tile">
          <div class="icon-chip" data-koda-description="koda:visual_frame:icon:concept:3"></div>
          <div>
            <div class="card-title" data-koda-description="koda:concept:3:title">Concept 3</div>
            <div class="card-body" data-koda-description="koda:concept:3:body">Body.</div>
          </div>
        </div>
      </div>
      <div class="banner">
        <div class="frame" data-koda-description="koda:visual_frame:banner:main"></div>
      </div>
    </div>
    <div class="koda-marker" data-koda-description="koda:layout:legal:TITLE_AND_BODY"></div>
  </div>
</body>
</html>
