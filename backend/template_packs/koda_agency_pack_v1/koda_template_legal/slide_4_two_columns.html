<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../_shared/base.css">
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <div class="slide-container">
    <div class="header">
      <div class="eyebrow" data-koda-description="koda:subtitle">Comparison</div>
      <h1 data-koda-description="koda:title">Two Columns</h1>
    </div>
    <div class="content">
      <div class="grid-2x2" style="grid-template-rows: 1fr;">
        <div class="tile" style="grid-column: 1 / span 1;">
          <div class="card-body" data-koda-description="koda:body:left">Left column body.</div>
        </div>
        <div class="tile" style="grid-column: 2 / span 1;">
          <div class="card-body" data-koda-description="koda:body:right">Right column body.</div>
        </div>
      </div>
    </div>
    <div class="koda-marker" data-koda-description="koda:layout:legal:TITLE_AND_TWO_COLUMNS"></div>
  </div>
</body>
</html>
