<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../_shared/base.css">
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <div class="slide-container">
    <div class="header">
      <div class="eyebrow" data-koda-description="koda:subtitle">Highlights</div>
      <h1 data-koda-description="koda:title">Four Cards</h1>
    </div>
    <div class="content">
      <div class="split">
        <div class="left" style="gap: 12px;">
          <div class="card compact">
            <div class="icon-chip" data-koda-description="koda:visual_frame:icon:card:1"></div>
            <div>
              <div class="card-title" data-koda-description="koda:card:1:title">Card 1</div>
              <div class="card-body" data-koda-description="koda:card:1:body">Body.</div>
            </div>
          </div>
          <div class="card compact">
            <div class="icon-chip accent" data-koda-description="koda:visual_frame:icon:card:2"></div>
            <div>
              <div class="card-title" data-koda-description="koda:card:2:title">Card 2</div>
              <div class="card-body" data-koda-description="koda:card:2:body">Body.</div>
            </div>
          </div>
          <div class="card compact">
            <div class="icon-chip" data-koda-description="koda:visual_frame:icon:card:3"></div>
            <div>
              <div class="card-title" data-koda-description="koda:card:3:title">Card 3</div>
              <div class="card-body" data-koda-description="koda:card:3:body">Body.</div>
            </div>
          </div>
          <div class="card compact">
            <div class="icon-chip accent" data-koda-description="koda:visual_frame:icon:card:4"></div>
            <div>
              <div class="card-title" data-koda-description="koda:card:4:title">Card 4</div>
              <div class="card-body" data-koda-description="koda:card:4:body">Body.</div>
            </div>
          </div>
        </div>
        <div class="right">
          <div class="panel">
            <div class="frame" data-koda-description="koda:visual_frame:diagram:main"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="koda-marker" data-koda-description="koda:layout:legal:TITLE_AND_BODY"></div>
  </div>
</body>
</html>
