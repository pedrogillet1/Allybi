<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../_shared/base.css">
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <div class="slide-container">
    <div class="header">
      <div class="eyebrow" data-koda-description="koda:subtitle">Framework</div>
      <h1 data-koda-description="koda:title">Three Pillars</h1>
    </div>
    <div class="content">
      <div class="triptych">
        <div class="pillar">
          <div class="pillar-num" data-koda-description="koda:pillar:1:number">01</div>
          <div class="pillar-bar"></div>
          <div class="pillar-title" data-koda-description="koda:pillar:1:title">Pillar One</div>
          <div class="pillar-body" data-koda-description="koda:pillar:1:body">Body.</div>
        </div>
        <div class="pillar">
          <div class="pillar-num" data-koda-description="koda:pillar:2:number">02</div>
          <div class="pillar-bar" style="background: var(--primary);"></div>
          <div class="pillar-title" data-koda-description="koda:pillar:2:title">Pillar Two</div>
          <div class="pillar-body" data-koda-description="koda:pillar:2:body">Body.</div>
        </div>
        <div class="pillar">
          <div class="pillar-num" data-koda-description="koda:pillar:3:number">03</div>
          <div class="pillar-bar"></div>
          <div class="pillar-title" data-koda-description="koda:pillar:3:title">Pillar Three</div>
          <div class="pillar-body" data-koda-description="koda:pillar:3:body">Body.</div>
        </div>
      </div>
    </div>
    <div class="koda-marker" data-koda-description="koda:layout:stats:TITLE_AND_BODY"></div>
  </div>
</body>
</html>
