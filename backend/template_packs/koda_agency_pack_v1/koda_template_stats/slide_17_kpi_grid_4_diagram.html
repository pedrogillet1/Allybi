<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../_shared/base.css">
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <div class="slide-container">
    <div class="header">
      <div class="eyebrow" data-koda-description="koda:subtitle">Metrics</div>
      <h1 data-koda-description="koda:title">KPI Snapshot</h1>
    </div>
    <div class="content">
      <div class="split">
        <div class="left">
          <div class="kpi-grid">
            <div class="kpi">
              <div class="icon-chip" data-koda-description="koda:visual_frame:icon:kpi:1"></div>
              <div>
                <div class="kpi-label" data-koda-description="koda:kpi:1:label">Metric</div>
                <div class="kpi-value" data-koda-description="koda:kpi:1:value">0</div>
                <div class="kpi-delta" data-koda-description="koda:kpi:1:delta">+0%</div>
              </div>
            </div>
            <div class="kpi">
              <div class="icon-chip accent" data-koda-description="koda:visual_frame:icon:kpi:2"></div>
              <div>
                <div class="kpi-label" data-koda-description="koda:kpi:2:label">Metric</div>
                <div class="kpi-value" data-koda-description="koda:kpi:2:value">0</div>
                <div class="kpi-delta" data-koda-description="koda:kpi:2:delta">+0%</div>
              </div>
            </div>
            <div class="kpi">
              <div class="icon-chip accent" data-koda-description="koda:visual_frame:icon:kpi:3"></div>
              <div>
                <div class="kpi-label" data-koda-description="koda:kpi:3:label">Metric</div>
                <div class="kpi-value" data-koda-description="koda:kpi:3:value">0</div>
                <div class="kpi-delta" data-koda-description="koda:kpi:3:delta">+0%</div>
              </div>
            </div>
            <div class="kpi">
              <div class="icon-chip" data-koda-description="koda:visual_frame:icon:kpi:4"></div>
              <div>
                <div class="kpi-label" data-koda-description="koda:kpi:4:label">Metric</div>
                <div class="kpi-value" data-koda-description="koda:kpi:4:value">0</div>
                <div class="kpi-delta" data-koda-description="koda:kpi:4:delta">+0%</div>
              </div>
            </div>
          </div>
        </div>
        <div class="right">
          <div class="panel">
            <div class="frame" data-koda-description="koda:visual_frame:diagram:main"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="koda-marker" data-koda-description="koda:layout:stats:TITLE_AND_BODY"></div>
  </div>
</body>
</html>
