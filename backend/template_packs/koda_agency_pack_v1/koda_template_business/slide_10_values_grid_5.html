<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../_shared/base.css">
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <div class="slide-container">
    <div class="header">
      <div class="eyebrow" data-koda-description="koda:subtitle">Values</div>
      <h1 data-koda-description="koda:title">Guiding Principles</h1>
    </div>
    <div class="content">
      <div class="values">
        <div class="value">
          <div class="icon-chip accent" data-koda-description="koda:visual_frame:icon:value:1"></div>
          <div>
            <div class="value-title" data-koda-description="koda:value:1:title">Value 1</div>
            <div class="value-body" data-koda-description="koda:value:1:body">Body.</div>
          </div>
        </div>
        <div class="value">
          <div class="icon-chip" data-koda-description="koda:visual_frame:icon:value:2"></div>
          <div>
            <div class="value-title" data-koda-description="koda:value:2:title">Value 2</div>
            <div class="value-body" data-koda-description="koda:value:2:body">Body.</div>
          </div>
        </div>
        <div class="value">
          <div class="icon-chip" data-koda-description="koda:visual_frame:icon:value:3"></div>
          <div>
            <div class="value-title" data-koda-description="koda:value:3:title">Value 3</div>
            <div class="value-body" data-koda-description="koda:value:3:body">Body.</div>
          </div>
        </div>
      </div>
      <div class="values-row2">
        <div class="value">
          <div class="icon-chip" data-koda-description="koda:visual_frame:icon:value:4"></div>
          <div>
            <div class="value-title" data-koda-description="koda:value:4:title">Value 4</div>
            <div class="value-body" data-koda-description="koda:value:4:body">Body.</div>
          </div>
        </div>
        <div class="value">
          <div class="icon-chip accent" data-koda-description="koda:visual_frame:icon:value:5"></div>
          <div>
            <div class="value-title" data-koda-description="koda:value:5:title">Value 5</div>
            <div class="value-body" data-koda-description="koda:value:5:body">Body.</div>
          </div>
        </div>
      </div>
    </div>
    <div class="koda-marker" data-koda-description="koda:layout:business:TITLE_AND_BODY"></div>
  </div>
</body>
</html>
