<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../_shared/base.css">
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <div class="slide-container">
    <div class="header">
      <div class="eyebrow" data-koda-description="koda:subtitle">Capabilities</div>
      <h1 data-koda-description="koda:title">2x2 Grid</h1>
    </div>
    <div class="content">
      <div class="grid-2x2">
        <div class="tile">
          <div class="icon-chip" data-koda-description="koda:visual_frame:icon:grid:1"></div>
          <div>
            <div class="card-title" data-koda-description="koda:grid:1:title">Tile 1</div>
            <div class="card-body" data-koda-description="koda:grid:1:body">Body.</div>
          </div>
        </div>
        <div class="tile">
          <div class="icon-chip accent" data-koda-description="koda:visual_frame:icon:grid:2"></div>
          <div>
            <div class="card-title" data-koda-description="koda:grid:2:title">Tile 2</div>
            <div class="card-body" data-koda-description="koda:grid:2:body">Body.</div>
          </div>
        </div>
        <div class="tile">
          <div class="icon-chip accent" data-koda-description="koda:visual_frame:icon:grid:3"></div>
          <div>
            <div class="card-title" data-koda-description="koda:grid:3:title">Tile 3</div>
            <div class="card-body" data-koda-description="koda:grid:3:body">Body.</div>
          </div>
        </div>
        <div class="tile">
          <div class="icon-chip" data-koda-description="koda:visual_frame:icon:grid:4"></div>
          <div>
            <div class="card-title" data-koda-description="koda:grid:4:title">Tile 4</div>
            <div class="card-body" data-koda-description="koda:grid:4:body">Body.</div>
          </div>
        </div>
      </div>
    </div>
    <div class="koda-marker" data-koda-description="koda:layout:business:TITLE_AND_BODY"></div>
  </div>
</body>
</html>
