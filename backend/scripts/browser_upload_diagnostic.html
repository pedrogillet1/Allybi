<!DOCTYPE html>
<html>
<head>
  <title>Upload Diagnostic Tool</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
    .section { background: #16213e; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .warning { color: #fbbf24; }
    pre { background: #0f0f23; padding: 10px; overflow-x: auto; border-radius: 4px; }
    input[type="file"] { margin: 10px 0; }
    h2 { color: #60a5fa; margin-top: 0; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <h1>Browser Upload Diagnostic Tool</h1>
  <p>This tool checks if your browser reads files correctly before upload.</p>

  <div class="section">
    <h2>Step 1: Select a File</h2>
    <p>Select an XLSX, DOCX, PPTX, or PDF file that failed to upload:</p>
    <input type="file" id="fileInput" accept=".xlsx,.docx,.pptx,.pdf,.zip">
  </div>

  <div class="section" id="results" style="display:none;">
    <h2>Step 2: Diagnostic Results</h2>
    <div id="output"></div>
  </div>

  <script>
    const SIGNATURES = {
      '504b0304': 'ZIP/XLSX/DOCX/PPTX (correct)',
      '504b0506': 'ZIP (empty archive)',
      '504b0708': 'ZIP (spanned archive)',
      '25504446': 'PDF',
      'd0cf11e0': 'MS Office (old format)',
      'ffd8ffe0': 'JPEG',
      'ffd8ffe1': 'JPEG (EXIF)',
      '89504e47': 'PNG',
      '47494638': 'GIF',
    };

    const EXPECTED_SIGNATURES = {
      'xlsx': '504b0304',
      'docx': '504b0304',
      'pptx': '504b0304',
      'pdf': '25504446',
      'zip': '504b0304'
    };

    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      document.getElementById('results').style.display = 'block';
      const output = document.getElementById('output');
      output.innerHTML = '<p>Analyzing file...</p>';

      try {
        // Read file as ArrayBuffer
        const arrayBuffer = await file.arrayBuffer();
        const bytes = new Uint8Array(arrayBuffer);

        // Get file extension
        const ext = file.name.split('.').pop().toLowerCase();
        const expectedSig = EXPECTED_SIGNATURES[ext];

        // Get first 4 bytes as hex
        const first4Hex = Array.from(bytes.slice(0, 4))
          .map(b => b.toString(16).padStart(2, '0'))
          .join('');

        // Get first 20 bytes as hex
        const first20Hex = Array.from(bytes.slice(0, 20))
          .map(b => b.toString(16).padStart(2, '0'))
          .join('');

        // Check signature
        const detectedFormat = SIGNATURES[first4Hex] || 'Unknown format';
        const signatureCorrect = first4Hex === expectedSig;

        // Calculate entropy of first 1000 bytes
        const sampleSize = Math.min(1000, bytes.length);
        const sample = bytes.slice(0, sampleSize);
        const freq = new Map();
        for (const b of sample) {
          freq.set(b, (freq.get(b) || 0) + 1);
        }
        let entropy = 0;
        for (const count of freq.values()) {
          const p = count / sampleSize;
          entropy -= p * Math.log2(p);
        }

        // Check if it looks like encrypted/random data
        const looksEncrypted = entropy > 7.5;

        // Build results HTML
        let html = `
          <div class="section">
            <h3>File Information</h3>
            <pre>
Name: ${file.name}
Size: ${file.size.toLocaleString()} bytes
Type: ${file.type || 'Not detected'}
Extension: .${ext}
            </pre>
          </div>

          <div class="section">
            <h3>File Signature Analysis</h3>
            <pre>
First 4 bytes (hex): ${first4Hex}
First 20 bytes (hex): ${first20Hex}
Detected format: ${detectedFormat}
Expected signature for .${ext}: ${expectedSig || 'N/A'}
            </pre>
            <p class="${signatureCorrect ? 'success' : 'error'}">
              ${signatureCorrect
                ? '✅ SIGNATURE CORRECT - Browser reads file correctly!'
                : '❌ SIGNATURE MISMATCH - File data is corrupted/encrypted!'}
            </p>
          </div>

          <div class="section">
            <h3>Entropy Analysis</h3>
            <pre>
Entropy: ${entropy.toFixed(2)} bits/byte
Reference: Random/encrypted data = ~8.0, Compressed = ~7-8, Text = ~4-5
            </pre>
            <p class="${looksEncrypted ? 'error' : 'success'}">
              ${looksEncrypted
                ? '⚠️ HIGH ENTROPY - Data looks encrypted or random!'
                : '✅ Normal entropy for this file type'}
            </p>
          </div>
        `;

        // Diagnosis
        html += `<div class="section"><h3>Diagnosis</h3>`;

        if (signatureCorrect && !looksEncrypted) {
          html += `
            <p class="success">✅ Browser reads the file correctly!</p>
            <p>The issue is likely in the upload process, not file reading.</p>
            <p>Possible causes:</p>
            <ul>
              <li>Network interception (VPN, proxy, antivirus)</li>
              <li>Browser extension modifying uploads</li>
              <li>JavaScript code transforming data before upload</li>
            </ul>
          `;
        } else if (!signatureCorrect && looksEncrypted) {
          html += `
            <p class="error">❌ File appears encrypted/corrupted BEFORE upload!</p>
            <p>Possible causes:</p>
            <ul>
              <li><strong>OneDrive Files On-Demand</strong> - File may not be fully synced locally</li>
              <li><strong>BitLocker/EFS encryption</strong> - Windows file encryption</li>
              <li><strong>Third-party encryption software</strong></li>
            </ul>
            <p class="warning">Try: Right-click the file in File Explorer → "Always keep on this device"</p>
          `;
        } else {
          html += `
            <p class="warning">⚠️ Unexpected file format</p>
            <p>The file doesn't match expected format for .${ext} extension.</p>
          `;
        }

        html += `</div>`;

        // Show raw bytes for debugging
        html += `
          <div class="section">
            <h3>Raw Data (first 100 bytes)</h3>
            <pre>${Array.from(bytes.slice(0, 100))
              .map((b, i) => b.toString(16).padStart(2, '0') + ((i + 1) % 16 === 0 ? '\n' : ' '))
              .join('')}</pre>
          </div>
        `;

        output.innerHTML = html;

      } catch (error) {
        output.innerHTML = `<p class="error">Error reading file: ${error.message}</p>`;
      }
    });
  </script>
</body>
</html>
