# Docker Compose for Local Development
# Usage: docker compose -f docker-compose.dev.yml up -d
#
# This provides:
# - PostgreSQL 15 database (port 5432)
# - Redis for BullMQ (port 6379)
#
# After starting, run: npx prisma migrate dev

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: koda-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: koda_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: koda-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
