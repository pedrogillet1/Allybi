steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/psychic-catwalk-474012-q1/koda-workers/extract:latest'
      - '-f'
      - 'workers_gcp/extract/Dockerfile'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/psychic-catwalk-474012-q1/koda-workers/extract:latest'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
timeout: '900s'
