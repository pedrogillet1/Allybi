# /etc/nginx/sites-available/admin-allybi
#
# Nginx reverse proxy config for admin.allybi.co with HTTPS
# Triple-layer security for admin routes:
#   Gate 1: Nginx Basic Auth at /api/admin/*
#   Gate 2: Backend X-KODA-ADMIN-KEY header check
#   Gate 3: Backend Admin JWT + KODA_OWNER_ADMIN_ID check
#
# SETUP INSTRUCTIONS:
# 1. Copy to /etc/nginx/sites-available/admin-allybi
# 2. ln -s /etc/nginx/sites-available/admin-allybi /etc/nginx/sites-enabled/
# 3. Create htpasswd: htpasswd -c /etc/nginx/.htpasswd kodaadmin
# 4. Get SSL: certbot --nginx -d admin.allybi.co
# 5. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name admin.allybi.co;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.allybi.co;

    # SSL (Certbot will fill these)
    ssl_certificate /etc/letsencrypt/live/admin.allybi.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.allybi.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Block direct access to admin folders (404)
    location ^~ /admin/ {
        return 404;
    }
    location ^~ /admin-dashboard/ {
        return 404;
    }

    # Admin API — Nginx Basic Auth + proxy (Gate 1)
    location ^~ /api/admin/ {
        auth_basic "Restricted Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }

    # Admin auth routes (login doesn't need basic auth)
    location ^~ /api/auth/admin {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API routes
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE/streaming support
        proxy_buffering off;
        proxy_cache off;
    }
}
