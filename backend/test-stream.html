<!DOCTYPE html>
<html>
<head>
  <title>Chat Stream Test</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
    #output { background: #f5f5f5; padding: 20px; border-radius: 8px; white-space: pre-wrap; min-height: 200px; }
    #status { margin: 10px 0; color: #666; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    input { padding: 10px; width: 100%; margin: 10px 0; box-sizing: border-box; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h1>Chat Stream Test</h1>

  <div>
    <label>API URL:</label>
    <input type="text" id="apiUrl" value="http://localhost:5000/api/chat/stream">
  </div>

  <div>
    <label>JWT Token:</label>
    <input type="text" id="token" value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJmMzNjNGE3YS0wMDNkLTQxZTgtYjI1OS02OTE0YmFjMWNjYzUiLCJlbWFpbCI6InRlc3RAa29kYS5jb20iLCJpYXQiOjE3Njk2MTYxNDEsImV4cCI6MTc2OTcwMjU0MX0.6ir4kg3o8k-qmXnA6khLjySCa0adggq1G9Fw_UmLa7E">
  </div>

  <div>
    <label>Message:</label>
    <input type="text" id="message" value="What is the total investment in the mezzanine project?">
  </div>

  <button onclick="testStream()">Send Message</button>
  <button onclick="clearOutput()">Clear</button>

  <div id="status">Ready</div>
  <div id="output"></div>

  <script>
    async function testStream() {
      const apiUrl = document.getElementById('apiUrl').value;
      const token = document.getElementById('token').value;
      const message = document.getElementById('message').value;
      const output = document.getElementById('output');
      const status = document.getElementById('status');

      output.textContent = '';
      status.textContent = 'Connecting...';
      status.className = '';

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'text/event-stream',
            ...(token ? { 'Authorization': `Bearer ${token}` } : {})
          },
          body: JSON.stringify({ message })
        });

        if (!response.ok) {
          status.textContent = `Error: ${response.status} ${response.statusText}`;
          status.className = 'error';
          const text = await response.text();
          output.textContent = text;
          return;
        }

        status.textContent = 'Streaming...';

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          let idx;
          while ((idx = buffer.indexOf('\n')) !== -1) {
            const line = buffer.slice(0, idx).trim();
            buffer = buffer.slice(idx + 1);

            if (!line || !line.startsWith('data:')) continue;

            const raw = line.slice(5).trim();
            if (!raw) continue;

            try {
              const evt = JSON.parse(raw);

              if (evt.type === 'delta') {
                fullText += evt.text || '';
                output.textContent = fullText;
              } else if (evt.type === 'final') {
                output.textContent = '--- FINAL RESPONSE ---\n' + (evt.content || fullText);
                status.textContent = 'Complete!';
                status.className = 'success';
              } else if (evt.type === 'error') {
                status.textContent = 'Error: ' + evt.message;
                status.className = 'error';
              } else {
                console.log('Event:', evt.type, evt);
              }
            } catch (e) {
              console.log('Parse error:', raw);
            }
          }
        }

        if (status.textContent === 'Streaming...') {
          status.textContent = 'Stream ended';
        }

      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        status.className = 'error';
        console.error(e);
      }
    }

    function clearOutput() {
      document.getElementById('output').textContent = '';
      document.getElementById('status').textContent = 'Ready';
      document.getElementById('status').className = '';
    }

    // Pre-fill token if in localStorage
    const savedToken = localStorage.getItem('accessToken');
    if (savedToken) {
      document.getElementById('token').value = savedToken;
    }
  </script>
</body>
</html>
