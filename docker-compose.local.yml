# Local development stack for KODA Upload Truth-Audit
#
# Provides:
#   - PostgreSQL (database)
#   - MinIO (S3-compatible storage for presigned URL uploads)
#   - Redis (optional, for background jobs)
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d
#   docker compose -f docker-compose.local.yml down
#
# MinIO Console: http://localhost:9001 (admin:adminpassword)
# MinIO API: http://localhost:9000

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: koda-postgres
    environment:
      POSTGRES_USER: koda
      POSTGRES_PASSWORD: koda_local_password
      POSTGRES_DB: koda_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koda -d koda_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: koda-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Create default bucket on startup
  minio-setup:
    image: minio/mc:latest
    container_name: koda-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/koda-local-uploads;
      mc anonymous set public local/koda-local-uploads;
      echo 'Bucket koda-local-uploads created and configured';
      exit 0;
      "

  redis:
    image: redis:7-alpine
    container_name: koda-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  redis_data:
