name: Secret Detection

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  detect-secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan --all-files --exclude-files '.*\.lock$' --exclude-files 'node_modules' > .secrets.baseline.new || true
          
          # Check for high-entropy secrets
          if grep -E '(password|secret|key|token|credential)' .secrets.baseline.new | grep -v 'false_positive'; then
            echo '::error::Potential secrets detected!'
            cat .secrets.baseline.new
            exit 1
          fi

      - name: Check for sshpass usage
        run: |
          if grep -rn 'sshpass' --include='*.sh' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.md' . 2>/dev/null | grep -v '.github/workflows/secret-detection.yml' | grep -v 'node_modules'; then
            echo '::error::sshpass usage detected! Use SSH keys instead.'
            exit 1
          fi
          echo 'No sshpass usage found.'

      - name: Check for hardcoded IPs with credentials
        run: |
          # Pattern: IP address followed by password-like patterns
          if grep -rn -E '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+.*password|password.*[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' --include='*.sh' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.md' . 2>/dev/null | grep -v 'node_modules' | grep -v '.github/workflows/secret-detection.yml'; then
            echo '::error::Hardcoded IP with credential pattern detected!'
            exit 1
          fi
          echo 'No hardcoded IP+credential patterns found.'

      - name: Check for AWS keys
        run: |
          if grep -rn -E 'AKIA[A-Z0-9]{16}' --include='*.sh' --include='*.yml' --include='*.yaml' --include='*.js' --include='*.ts' --include='*.json' . 2>/dev/null | grep -v 'node_modules'; then
            echo '::error::AWS Access Key detected!'
            exit 1
          fi
          echo 'No AWS keys found.'
