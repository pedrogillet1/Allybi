name: Certification Evidence Bundle

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, develop ]

jobs:
  cert-evidence:
    name: Build Certification Evidence Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap frontend grading lineage artifacts
        run: node ../frontend/e2e/grading/bootstrap-report-lineage.mjs --strict

      - name: Run wiring-proof and wrong-doc trap suites
        run: |
          npm run test:cert:wrong-doc
          npm run test:cert:wiring
          npm run test:cert:collision-matrix-exhaustive
          npm run test:cert:telemetry-completeness
          npm run test:cert:rollout-safety
          npm run test:cert:turn-debug-packet

      - name: Run eval pack integrity checks
        run: |
          npm run test:docint:eval-pack
          npm run eval:docint:strict
          npm run audit:docint:eval-governance:strict
          npm run audit:banks:meta-tests
          npm run audit:banks:meta-tests:all

      - name: Run retrieval + certification audits (CI profile)
        env:
          CERT_PROFILE: ci
        run: |
          npm run audit:retrieval:strict
          npm run audit:cert:strict
          npm run audit:observability:ops-contract:strict
          npm run audit:query-latency:stability:strict

      - name: Verify immutable gate freshness and thresholds
        run: |
          npm run audit:p0:verify:strict
          npm run audit:cert:verify:strict

      - name: Build immutable evidence bundle
        run: npm run cert:evidence:bundle

      - name: Upload evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: certification-evidence-bundle
          path: backend/reports/cert/evidence
          retention-days: 14
