name: Upload Truth Audit

on:
  pull_request:
    paths:
      - 'frontend/src/services/unifiedUploadService.js'
      - 'frontend/src/services/resumableUploadService.js'
      - 'frontend/src/config/upload.config.js'
      - 'backend/src/entrypoints/http/routes/presigned-urls.routes.ts'
      - 'backend/src/entrypoints/http/routes/multipart-upload.routes.ts'
      - 'backend/src/entrypoints/http/routes/batch.routes.ts'
      - '.github/workflows/upload-truth-audit.yml'

jobs:
  upload-audit:
    name: Upload Truth Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run upload route truth tests
        working-directory: backend
        run: |
          npm test -- --runInBand --runTestsByPath \
            src/entrypoints/http/routes/multipart-upload.routes.test.ts \
            src/entrypoints/http/routes/presigned-urls.routes.test.ts \
            src/entrypoints/http/routes/batch.routes.test.ts

      - name: Check for failures
        run: |
          echo "Upload truth audit passed"
          echo "Multipart, presigned, and batch scheduling contract checks succeeded."
