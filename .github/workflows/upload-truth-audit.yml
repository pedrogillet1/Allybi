name: Upload Truth Audit

on:
  pull_request:
    paths:
      - 'frontend/src/services/unifiedUploadService.js'
      - 'frontend/src/services/resumableUploadService.js'
      - 'frontend/src/config/upload.config.js'
      - 'backend/src/entrypoints/http/routes/presigned-urls.routes.ts'
      - 'backend/src/entrypoints/http/routes/multipart-upload.routes.ts'
      - 'backend/src/entrypoints/http/routes/batch.routes.ts'
      - '.github/workflows/upload-truth-audit.yml'

jobs:
  upload-audit:
    name: Upload Truth Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate deterministic test token
        id: token
        working-directory: backend
        run: |
          TOKEN=$(node -e "const jwt=require('jsonwebtoken'); const token=jwt.sign({userId:'upload-truth-ci-user', email:'upload.truth.ci@example.com'}, process.env.JWT_ACCESS_SECRET, {expiresIn:'30m'}); if(!token){process.exit(1);} process.stdout.write(token);")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
        env:
          JWT_ACCESS_SECRET: ci-upload-truth-secret

      - name: Assert token was generated
        run: |
          test -n "${{ steps.token.outputs.token }}"

      - name: Run upload route truth tests
        working-directory: backend
        run: |
          npm test -- --runInBand --runTestsByPath \
            src/entrypoints/http/routes/multipart-upload.routes.test.ts \
            src/entrypoints/http/routes/presigned-urls.routes.test.ts \
            src/entrypoints/http/routes/batch.routes.test.ts

      - name: Check for failures
        run: |
          echo "Upload truth audit passed"
          echo "Token generation and multipart scheduling contract checks succeeded."
