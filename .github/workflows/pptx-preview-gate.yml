name: PPTX Preview Gate

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/src/services/pptxPreview*.ts'
      - 'backend/src/services/pptxSignedUrlCache.service.ts'
      - 'backend/src/services/pptxPreviewMetrics.service.ts'
      - 'backend/src/schemas/pptxPreview.schema.ts'
      - 'backend/src/tests/pptxPreview.*.test.ts'
      - 'backend/src/tests/__snapshots__/pptx-*.snapshot.json'
      - 'backend/src/controllers/document.controller.ts'
      - 'backend/src/middleware/correlationId.middleware.ts'
      - 'backend/src/middleware/rateLimit.middleware.ts'
      - 'backend/src/scripts/canary-pptx-preview.ts'
      - 'frontend/src/components/PPTXPreview.jsx'
      - '.github/workflows/pptx-preview-gate.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/src/services/pptxPreview*.ts'
      - 'backend/src/services/pptxSignedUrlCache.service.ts'
      - 'backend/src/services/pptxPreviewMetrics.service.ts'
      - 'backend/src/schemas/pptxPreview.schema.ts'
      - 'backend/src/tests/pptxPreview.*.test.ts'
      - 'backend/src/tests/__snapshots__/pptx-*.snapshot.json'
      - 'backend/src/controllers/document.controller.ts'
      - 'backend/src/middleware/correlationId.middleware.ts'
      - 'backend/src/middleware/rateLimit.middleware.ts'
      - 'backend/src/scripts/canary-pptx-preview.ts'
      - 'frontend/src/components/PPTXPreview.jsx'
      - '.github/workflows/pptx-preview-gate.yml'

jobs:
  pptx-preview-tests:
    name: PPTX Preview Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🗄️ Generate Prisma Client
        run: npx prisma generate
        continue-on-error: true

      - name: 🧪 Run PPTX Preview Unit Tests
        run: npm test -- pptxPreview.utils.test.ts
        id: pptx-unit-tests

      - name: 🔒 Run PPTX Contract Tests (Regression Lock)
        run: npm test -- pptxPreview.contract.test.ts
        id: pptx-contract-tests

      - name: 📊 Test Summary
        if: always()
        run: |
          UNIT_RESULT="${{ steps.pptx-unit-tests.outcome }}"
          CONTRACT_RESULT="${{ steps.pptx-contract-tests.outcome }}"

          echo "Unit Tests: $UNIT_RESULT"
          echo "Contract Tests (Regression Lock): $CONTRACT_RESULT"

          if [ "$UNIT_RESULT" == "success" ] && [ "$CONTRACT_RESULT" == "success" ]; then
            echo "✅ All PPTX preview tests passed"
          else
            echo "❌ PPTX preview tests failed"
            if [ "$CONTRACT_RESULT" != "success" ]; then
              echo "⚠️  Contract tests failed - API shape changed! Update snapshots if intentional."
            fi
            exit 1
          fi

  backend-build:
    name: Backend Build Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🗄️ Generate Prisma Client
        run: npx prisma generate
        continue-on-error: true

      - name: 🏗️ TypeScript Build
        run: npm run build
        env:
          CI: true

  frontend-build:
    name: Frontend Build Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build
        env:
          CI: true

  gate-summary:
    name: Gate Summary
    runs-on: ubuntu-latest
    needs: [pptx-preview-tests, backend-build, frontend-build]
    if: always()

    steps:
      - name: 📊 Check Results
        run: |
          echo "# PPTX Preview Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- PPTX Tests: ${{ needs.pptx-preview-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Build: ${{ needs.backend-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Build: ${{ needs.frontend-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.pptx-preview-tests.result }}" != "success" ] || \
             [ "${{ needs.backend-build.result }}" != "success" ] || \
             [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "❌ Gate FAILED - Cannot merge" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ Gate PASSED - Safe to merge" >> $GITHUB_STEP_SUMMARY
          fi
