name: Prisma Migration Replay

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  pull_request:
    paths:
      - "backend/prisma/**"
      - "backend/package.json"
      - "backend/package-lock.json"
      - "backend/scripts/prisma/**"
      - ".github/workflows/prisma-migration-replay.yml"
  push:
    branches: [main, develop]
    paths:
      - "backend/prisma/**"
      - "backend/package.json"
      - "backend/package-lock.json"
      - "backend/scripts/prisma/**"
      - ".github/workflows/prisma-migration-replay.yml"

jobs:
  replay-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: prisma_ci
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prisma -d prisma_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://prisma:prisma@localhost:5432/prisma_ci?schema=public
      DIRECT_DATABASE_URL: postgresql://prisma:prisma@localhost:5432/prisma_ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run replay certification gate
        run: npm run prisma:replay:cert
        env:
          PRISMA_REPLAY_CERT_OUT: "reports/prisma/replay-cert.json"
          PRISMA_TELEMETRY_AUDIT_OUT: "reports/prisma/telemetry-audit-ci.json"

      - name: Upload telemetry audit artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: prisma-telemetry-audit
          path: backend/reports/prisma/telemetry-audit-ci.json
          if-no-files-found: warn

      - name: Upload replay certification artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: prisma-replay-cert
          path: backend/reports/prisma/replay-cert.json
          if-no-files-found: warn

      - name: Upload behavioral telemetry artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: prisma-telemetry-audit-behavioral
          path: backend/reports/prisma/telemetry-audit-behavioral.json
          if-no-files-found: warn
