name: Prisma Migration Replay

on:
  pull_request:
    paths:
      - "backend/prisma/**"
      - "backend/package.json"
      - "backend/package-lock.json"
      - "backend/scripts/prisma/**"
      - ".github/workflows/prisma-migration-replay.yml"
  push:
    branches: [main, develop]
    paths:
      - "backend/prisma/**"
      - "backend/package.json"
      - "backend/package-lock.json"
      - "backend/scripts/prisma/**"
      - ".github/workflows/prisma-migration-replay.yml"

jobs:
  replay-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: prisma_ci
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prisma -d prisma_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://prisma:prisma@localhost:5432/prisma_ci?schema=public
      DIRECT_DATABASE_URL: postgresql://prisma:prisma@localhost:5432/prisma_ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Seed service_role before migration replay
        run: npm run prisma:rls:seed-service-role

      - name: Validate + replay migrations
        run: npm run prisma:replay:check

      - name: Verify RLS profile (CI soft profile)
        run: npm run prisma:rls:verify
        env:
          PRISMA_RLS_PROFILE: "ci"

      - name: Audit telemetry ambiguity (fail on ambiguous rows)
        run: npm run prisma:telemetry:repair:audit
        env:
          PRISMA_TELEMETRY_AUDIT_FAIL_ON_AMBIGUOUS: "1"
          PRISMA_TELEMETRY_AUDIT_OUT: "reports/prisma/telemetry-audit-ci.json"

      - name: Upload telemetry audit artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: prisma-telemetry-audit
          path: backend/reports/prisma/telemetry-audit-ci.json
          if-no-files-found: warn

      - name: Verify RLS profile (strict prod profile)
        run: npm run prisma:rls:verify
        env:
          PRISMA_RLS_PROFILE: "prod"

      - name: Run Prisma invariant tests
        run: npm run test:prisma:invariants
