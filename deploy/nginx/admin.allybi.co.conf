# ─────────────────────────────────────────────────────────────────────────────
# admin.allybi.co — Admin dashboard (separate domain, multi-layer auth)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name admin.allybi.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.allybi.co;

    ssl_certificate     /etc/letsencrypt/live/admin.allybi.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.allybi.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    auth_basic           "Allybi Admin";
    auth_basic_user_file /etc/nginx/.htpasswd_koda_admin;

    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        set_by_lua_block $koda_admin_key {
            local f = io.open("/etc/nginx/koda_admin_key.txt", "r")
            if f then
                local key = f:read("*a")
                f:close()
                return key
            end
            return ""
        }
        proxy_set_header X-KODA-ADMIN-KEY $koda_admin_key;

        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;
    }

    root /var/www/admin.allybi.co;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires    7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    access_log /var/log/nginx/admin.allybi.access.log;
    error_log  /var/log/nginx/admin.allybi.error.log;
}
