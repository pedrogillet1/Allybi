# ─────────────────────────────────────────────────────────────────────────────
# getkodabackend.com — Admin dashboard (separate domain, multi-layer auth)
#
# Layer 1: Nginx Basic Auth gate (.htpasswd_koda_admin)
# Layer 2: JWT auth (handled in app via AuthContext)
# Layer 3: X-KODA-ADMIN-KEY header injected by Nginx (never leaves the server)
# Layer 4: KODA_OWNER_ADMIN_ID lockdown in backend middleware
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name getkodabackend.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name getkodabackend.com;

    # ── TLS ──────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/getkodabackend.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/getkodabackend.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"       always;
    add_header X-Content-Type-Options    "nosniff"    always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # ── Basic Auth gate (Layer 1) ────────────────────────────────────────
    auth_basic           "Koda Admin";
    auth_basic_user_file /etc/nginx/.htpasswd_koda_admin;

    # ── Admin API proxy ──────────────────────────────────────────────────
    # Inject X-KODA-ADMIN-KEY so it never leaves the server (Layer 3)
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Inject the admin key — value read from a file to avoid storing in config
        # Create with:  echo -n 'YOUR_KEY' > /etc/nginx/koda_admin_key.txt
        set_by_lua_block $koda_admin_key {
            local f = io.open("/etc/nginx/koda_admin_key.txt", "r")
            if f then
                local key = f:read("*a")
                f:close()
                return key
            end
            return ""
        }
        proxy_set_header X-KODA-ADMIN-KEY $koda_admin_key;

        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # ── Static admin dashboard ───────────────────────────────────────────
    root /var/www/getkodabackend.com;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires    7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/getkodabackend.access.log;
    error_log  /var/log/nginx/getkodabackend.error.log;
}
