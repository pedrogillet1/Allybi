# ─────────────────────────────────────────────────────────────────────────────
# allybi.co — Webapp + API (single domain, no subdomain)
#
# Root domain serves the webapp with API reverse proxy to backend :5000.
# app.allybi.co redirects to allybi.co for backwards compatibility.
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect for root domain
server {
    listen 80;
    server_name allybi.co www.allybi.co;
    return 301 https://allybi.co$request_uri;
}

# www → bare domain redirect
server {
    listen 443 ssl http2;
    server_name www.allybi.co;

    ssl_certificate     /etc/letsencrypt/live/allybi.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/allybi.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://allybi.co$request_uri;
}

# ─── Main: allybi.co (webapp + API) ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name allybi.co;

    ssl_certificate     /etc/letsencrypt/live/allybi.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/allybi.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    client_max_body_size 100m;

    # Block direct access to admin routes
    location ~ ^/(api/admin|admin|internal/admin) {
        return 404;
    }

    # API reverse proxy to backend
    location ^~ /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
    }

    # Socket.IO (websocket + polling)
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
    }

    # Landing page from separate repo (symlink: /var/www/landing-root/homepage → getkoda-landing)
    location ^~ /homepage {
        root /var/www/landing-root;
        index index.html;
        try_files $uri $uri/ =404;

        # Rewrite relative CSS/JS/image paths to absolute so browser has no ambiguity
        sub_filter 'href="./' 'href="/homepage/';
        sub_filter 'src="./'  'src="/homepage/';
        sub_filter 'src="assets/' 'src="/homepage/assets/';
        sub_filter 'href="assets/' 'href="/homepage/assets/';
        sub_filter_once off;
        sub_filter_types text/html;
    }

    root /var/www/allybi.co;
    index index.html;

    # Product requirement: root should land directly in chat.
    location = / {
        return 302 /c/k4r8f5;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
}

# ─── app.allybi.co → allybi.co redirect (backwards compat) ──────────────────
server {
    listen 80;
    server_name app.allybi.co;
    return 301 https://allybi.co$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.allybi.co;

    ssl_certificate     /etc/letsencrypt/live/allybi.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/allybi.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://allybi.co$request_uri;
}

