# ─────────────────────────────────────────────────────────────────────────────
# getkoda.ai — Public frontend + API proxy
#
# Serves the public Koda web app and proxies /api to the backend.
# Hard-blocks all admin paths so they are never reachable from the public domain.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name getkoda.ai www.getkoda.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name getkoda.ai www.getkoda.ai;

    # ── TLS ──────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/getkoda.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/getkoda.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Hard-block admin paths (return 404, not 403, to avoid leaking) ──
    location ~ ^/(api/admin|admin|internal/admin) {
        return 404;
    }

    # ── Public API proxy ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts for long-running streaming responses
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
    }

    # ── Static frontend ──────────────────────────────────────────────────
    root /var/www/getkoda.ai;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
}
