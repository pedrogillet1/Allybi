version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: koda_postgres_dev
    environment:
      POSTGRES_USER: koda
      POSTGRES_PASSWORD: koda
      POSTGRES_DB: koda_dev
    ports:
      - "5433:5432"
    volumes:
      - koda_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koda -d koda_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: koda_redis_dev
    ports:
      - "6380:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  koda_pgdata:
